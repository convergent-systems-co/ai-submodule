name: Publish Policy Engine

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: governance/engine
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Verify wheel contents
        run: |
          pip install dist/*.whl
          python -c "from governance.engine import __version__; print(f'Installed version: {__version__}')"
          python -c "from governance.engine.policy_engine import PolicyEngine; print('PolicyEngine importable')"

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: governance/engine/dist/
