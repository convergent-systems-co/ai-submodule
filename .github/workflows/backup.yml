name: Backup

# Maintains an offsite backup copy of repository content.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview without pushing'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: backup
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.repository == 'SET-Apps/ai-submodule'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare
        run: |
          set -euo pipefail

          MIRROR_DIR=$(mktemp -d)
          cp -a . "$MIRROR_DIR/"
          cd "$MIRROR_DIR"

          # Strip internal state
          rm -rf .git
          rm -f jm-compliance.yml 2>/dev/null || true
          rm -rf .governance/state/agent-log/ 2>/dev/null || true
          rm -rf .governance/checkpoints/ 2>/dev/null || true
          rm -rf .claude/ 2>/dev/null || true
          rm -rf .coverage .hypothesis/ 2>/dev/null || true

          # ── Content normalization ──
          # Order matters: longest match first to prevent partial replacements
          find . -type f \( -name '*.md' -o -name '*.yml' -o -name '*.yaml' \
            -o -name '*.json' -o -name '*.toml' -o -name '*.py' \
            -o -name '*.ts' -o -name '*.js' -o -name '*.sh' \
            -o -name '*.html' -o -name '*.css' \) \
            ! -path './node_modules/*' ! -path './.venv/*' ! -path './dist/*' \
            -exec sed -i \
              -e 's/Dark Factory Governance Platform/Dark Forge/g' \
              -e 's/Dark Factory Governance Framework/Dark Forge/g' \
              -e 's/Dark Factory Governance Model/Dark Forge/g' \
              -e 's/Dark Factory Governance Review/Dark Forge Review/g' \
              -e 's/Dark Factory Governance/Dark Forge/g' \
              -e 's/Dark Factory/Dark Forge/g' \
              -e 's/dark-factory-engine/dark-forge-engine/g' \
              -e 's/dark_factory/dark_forge/g' \
              {} +

          # Repository identity
          find . -type f \( -name '*.md' -o -name '*.yml' -o -name '*.yaml' \
            -o -name '*.json' -o -name '*.toml' -o -name '*.py' \
            -o -name '*.ts' -o -name '*.js' -o -name '*.sh' \) \
            ! -path './node_modules/*' ! -path './.venv/*' ! -path './dist/*' \
            -exec sed -i \
              -e 's|SET-Apps/ai-submodule|convergent-systems-co/dark-forge|g' \
              -e 's|git@github\.com:SET-Apps/ai-submodule\.git|git@github.com:convergent-systems-co/dark-forge.git|g' \
              -e 's|https://github\.com/SET-Apps/ai-submodule|https://github.com/convergent-systems-co/dark-forge|g' \
              -e 's/ai-submodule/dark-forge/g' \
              {} +

          # Workflow display name
          if [ -f .github/workflows/dark-factory-governance.yml ]; then
            sed -i 's/^name: Dark Factory Governance$/name: Dark Forge/' \
              .github/workflows/dark-factory-governance.yml
          fi

          # Remove this workflow from the mirror — it should not exist upstream
          rm -f .github/workflows/backup.yml

          echo "MIRROR_DIR=$MIRROR_DIR" >> "$GITHUB_ENV"

      - name: Push
        if: inputs.dry_run != 'true'
        env:
          DEPLOY_KEY: ${{ secrets.BACKUP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          cd "$MIRROR_DIR"

          git init -b main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          echo "$DEPLOY_KEY" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          echo -e "Host github.com\n  IdentityFile ~/.ssh/key" > ~/.ssh/config

          git add -A
          git commit -m "sync ${GITHUB_SHA::8}"

          git remote add upstream git@github.com:convergent-systems-co/dark-forge.git
          git push -f upstream main

          rm -f ~/.ssh/key

      - name: Summary
        if: inputs.dry_run == 'true'
        run: |
          cd "$MIRROR_DIR"
          echo "Files: $(find . -type f ! -path './.git/*' | wc -l)"
          echo "Transforms applied. Sample:"
          grep -r "Dark Forge" --include='*.md' -l 2>/dev/null | head -5 || echo "  (none found)"
