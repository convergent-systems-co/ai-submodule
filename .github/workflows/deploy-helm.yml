name: Deploy Helm Chart

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      app_id:
        description: 'Application ID'
        required: true
        default: 'a'
        type: string
      version:
        description: 'Image version to deploy (e.g., 0.1.0)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Helm (${{ inputs.environment }}/${{ inputs.app_id }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load environment config
        id: env
        run: |
          # Load global env
          if [ -f env/.env ]; then
            set -a && source env/.env && set +a
          fi
          # Load stage-specific env
          ENV_FILE="env/${{ inputs.environment }}/${{ inputs.app_id }}/.env"
          if [ -f "$ENV_FILE" ]; then
            set -a && source "$ENV_FILE" && set +a
          fi
          echo "RESOURCE_GROUP=${RESOURCE_GROUP}" >> "$GITHUB_ENV"
          echo "AKS_CLUSTER=${AKS_CLUSTER}" >> "$GITHUB_ENV"
          echo "AKS_NAMESPACE=${AKS_NAMESPACE}" >> "$GITHUB_ENV"
          echo "ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}" >> "$GITHUB_ENV"
          echo "KEY_VAULT=${KEY_VAULT}" >> "$GITHUB_ENV"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$RESOURCE_GROUP" \
            --name "$AKS_CLUSTER" \
            --overwrite-existing

      - name: Resolve managed identity client ID
        id: identity
        run: |
          MI_NAME="id-set-${{ inputs.environment }}-governance-api-${{ inputs.app_id }}"
          CLIENT_ID=$(az identity show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$MI_NAME" \
            --query clientId \
            --output tsv)
          echo "client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"

      - name: Get Key Vault tenant ID
        id: keyvault
        run: |
          TENANT_ID=$(az keyvault show \
            --name "$KEY_VAULT" \
            --query "properties.tenantId" \
            --output tsv)
          echo "tenant_id=$TENANT_ID" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Create namespace
        run: |
          kubectl create namespace "$AKS_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Helm
        run: |
          helm upgrade --install governance-service helm/governance-service/ \
            --namespace "$AKS_NAMESPACE" \
            --values "helm/governance-service/env/${{ inputs.environment }}/values.yaml" \
            --set image.repository="${ACR_LOGIN_SERVER}/governance-service" \
            --set image.tag="${{ inputs.version }}" \
            --set "serviceAccount.annotations.azure\.workload\.identity/client-id=${{ steps.identity.outputs.client_id }}" \
            --set keyvault.name="$KEY_VAULT" \
            --set keyvault.tenantId="${{ steps.keyvault.outputs.tenant_id }}" \
            --wait \
            --timeout 300s

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/governance-service \
            --namespace "$AKS_NAMESPACE" \
            --timeout=300s
