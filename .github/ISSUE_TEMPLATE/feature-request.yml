name: Feature Request
description: Request a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Request
        Provide enough detail for an autonomous agent to implement this without follow-up questions.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What do you want to happen? Describe the desired outcome, not the implementation.
      placeholder: "As a [user/developer/admin], I want [capability] so that [benefit]."
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know this is done? List specific, testable conditions.
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this?
      options:
        - P4 — Backlog (nice to have)
        - P3 — Low (address when possible)
        - P2 — Medium (address soon)
        - P1 — High (address this sprint)
        - P0 — Critical (immediate action required)
    validations:
      required: false

  - type: dropdown
    id: risk-level
    attributes:
      label: Risk Level
      description: How much could this break?
      options:
        - Low — Additive change, no existing behavior affected
        - Medium — Modifies existing behavior, limited blast radius
        - High — Touches critical paths, security, or infrastructure
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any additional information, screenshots, links, or references.
    validations:
      required: false
