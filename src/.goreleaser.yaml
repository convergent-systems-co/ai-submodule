version: 2

project_name: dark-governance

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: dark-governance
    main: ./cmd/dark-governance/
    binary: dark-governance
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/convergent-systems-co/dark-forge/src/internal/version.Version={{ .Version }}
      - -X github.com/convergent-systems-co/dark-forge/src/internal/version.Commit={{ .ShortCommit }}
      - -X github.com/convergent-systems-co/dark-forge/src/internal/version.Date={{ .Date }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - none*

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: SET-Apps
    name: dark-forge
  draft: false
  prerelease: auto
  header: |
    ## Installation

    ### Go Install
    ```bash
    go install github.com/convergent-systems-co/dark-forge/src/cmd/dark-governance@{{ .Tag }}
    ```

    ### Homebrew (macOS/Linux)
    ```bash
    brew tap SET-Apps/tap
    brew install dark-governance
    ```

    ### Curl (macOS/Linux)
    ```bash
    curl -sSfL https://raw.githubusercontent.com/convergent-systems-co/dark-forge/main/src/scripts/install.sh | sh
    ```

    ### Manual Download
    Download the appropriate archive for your platform from the assets below.

brews:
  - name: dark-governance
    # Push formula to the dedicated Homebrew tap repo.
    # GoReleaser will commit the updated formula with correct SHA256 checksums
    # on each tagged release. Developers tap via:
    #   brew tap SET-Apps/tap
    repository:
      owner: SET-Apps
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: main
      pull_request:
        enabled: true
        base:
          owner: SET-Apps
          name: homebrew-tap
          branch: main
    directory: Formula
    homepage: https://github.com/convergent-systems-co/dark-forge
    description: AI governance framework CLI for autonomous software delivery
    license: MIT
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    commit_msg_template: "feat(homebrew): update formula to {{ .Tag }}"
    install: |
      bin.install "dark-governance"
    test: |
      system "#{bin}/dark-governance", "version"
    # skip_upload: auto means bottles are only uploaded for non-prerelease tags
    skip_upload: auto
    # Extra install instructions shown in `brew info`
    caveats: |
      dark-governance is the AI governance framework CLI.
      Run 'dark-governance --help' to get started.

      For documentation, visit:
        https://github.com/convergent-systems-co/dark-forge/blob/main/docs/guides/homebrew-installation.md
